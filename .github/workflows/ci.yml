name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend: TypeScript + Vite build ───────────────────────────────────────
  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Vite requires real env vars to build; supply stubs so the build doesn't
      # throw "Missing VITE_SUPABASE_URL" at import time.
      - name: Build (production)
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_BACKEND_URL: https://placeholder-backend.example.com
        run: npm run build

  # ─── Backend: TypeScript compilation ─────────────────────────────────────────
  backend:
    name: Backend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

  # ─── Database: Apply pending migrations to production ────────────────────────
  # Runs only on push to main (not on PRs) so migrations hit production exactly once.
  # Required GitHub Secrets:
  #   SUPABASE_ACCESS_TOKEN  → supabase.com → Account → Access Tokens
  #   SUPABASE_PROJECT_REF   → supabase.com/dashboard/project/[THIS_PART]/...
  #   SUPABASE_DB_PASSWORD   → Supabase Dashboard → Settings → Database → Database password
  migrate:
    name: Database — deploy migrations
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Skip when secrets haven't been added to GitHub yet.
      - name: Check secrets are configured
        id: secrets
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          PASS: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$REF" ] && [ -n "$PASS" ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "✅ All 3 Supabase secrets found — will deploy migrations"
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "::notice::Supabase secrets not fully configured. Add SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, and SUPABASE_DB_PASSWORD to GitHub Secrets."
          fi

      - name: Setup Supabase CLI
        if: steps.secrets.outputs.ok == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Mark migrations 001–011 as already applied (they were run manually via SQL Editor).
      # Uses the Management API — no DB password needed for this step.
      - name: Mark existing migrations as applied
        if: steps.secrets.outputs.ok == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          REF="${{ secrets.SUPABASE_PROJECT_REF }}"
          for v in 001 002 003 004 005 006 007 008 009 010 011; do
            supabase migration repair --status applied "$v" --project-ref "$REF" || true
          done

      # Push any new migration files (012, 013, ...) that aren't in history yet.
      # PGPASSWORD is read automatically by the CLI for the direct DB connection.
      - name: Apply pending migrations
        if: steps.secrets.outputs.ok == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
