name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend: TypeScript + Vite build ───────────────────────────────────────
  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Vite requires real env vars to build; supply stubs so the build doesn't
      # throw "Missing VITE_SUPABASE_URL" at import time.
      - name: Build (production)
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_BACKEND_URL: https://placeholder-backend.example.com
        run: npm run build

  # ─── Backend: TypeScript compilation ─────────────────────────────────────────
  backend:
    name: Backend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

  # ─── Database: Apply pending migrations to production ────────────────────────
  # Runs only on push to main (not on PRs) so migrations hit production exactly once.
  # Required GitHub Secrets:
  #   SUPABASE_ACCESS_TOKEN  → supabase.com → Account → Access Tokens → Generate new token
  #   SUPABASE_PROJECT_REF   → your project ref from https://app.supabase.com/project/[REF]
  #   SUPABASE_DB_PASSWORD   → Project Settings → Database → Database Password
  migrate:
    name: Database — deploy migrations
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Skip all migration steps when secrets haven't been added to GitHub yet.
      # Only 2 secrets needed:
      #   SUPABASE_ACCESS_TOKEN → supabase.com → your avatar → Account → Access Tokens → Generate new token
      #   SUPABASE_PROJECT_REF  → the part of your project URL: supabase.com/dashboard/project/[THIS_PART]/...
      - name: Check secrets are configured
        id: secrets
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$REF" ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "✅ Supabase secrets found — will deploy migrations"
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "::notice::Supabase secrets not configured yet. Migrations skipped. Add SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF to GitHub Secrets to enable auto-deploy."
          fi

      - name: Setup Supabase CLI
        if: steps.secrets.outputs.ok == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Mark migrations 001–011 as already applied (they were run manually via SQL Editor).
      # Uses the management API — no database password needed.
      # "|| true" makes each line safe to re-run (idempotent).
      - name: Mark existing migrations as applied
        if: steps.secrets.outputs.ok == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          REF="${{ secrets.SUPABASE_PROJECT_REF }}"
          for v in 001 002 003 004 005 006 007 008 009 010 011; do
            supabase migration repair --status applied "$v" --project-ref "$REF" || true
          done

      # Push any new migration files (012, 013, ...) that aren't in history yet
      - name: Apply pending migrations
        if: steps.secrets.outputs.ok == 'true'
        run: supabase db push --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
