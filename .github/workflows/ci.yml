name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend: TypeScript + Vite build ───────────────────────────────────────
  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Vite requires real env vars to build; supply stubs so the build doesn't
      # throw "Missing VITE_SUPABASE_URL" at import time.
      - name: Build (production)
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_BACKEND_URL: https://placeholder-backend.example.com
        run: npm run build

  # ─── Backend: TypeScript compilation ─────────────────────────────────────────
  backend:
    name: Backend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

  # ─── Database: Apply pending migrations to production ────────────────────────
  # Runs only on push to main (not on PRs) so migrations hit production exactly once.
  # Required GitHub Secrets:
  #   SUPABASE_ACCESS_TOKEN  → supabase.com → Account → Access Tokens → Generate new token
  #   SUPABASE_PROJECT_REF   → your project ref from https://app.supabase.com/project/[REF]
  #   SUPABASE_DB_PASSWORD   → Project Settings → Database → Database Password
  migrate:
    name: Database — deploy migrations
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Skip all migration steps when secrets haven't been added to GitHub yet.
      # Add SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD
      # in: GitHub repo → Settings → Secrets and variables → Actions
      - name: Check secrets are configured
        id: secrets
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          PASS: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$REF" ] && [ -n "$PASS" ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "✅ Supabase secrets found — will deploy migrations"
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "::notice::Supabase secrets not configured yet. Migrations skipped. Add SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD to GitHub Secrets to enable auto-deploy."
          fi

      - name: Setup Supabase CLI
        if: steps.secrets.outputs.ok == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Mark migrations 001–011 as already applied so the CLI never re-runs them.
      # These were applied manually via Supabase SQL Editor.
      # New migrations (012+) will be applied automatically by db push below.
      # Uses ON CONFLICT DO NOTHING — safe to run repeatedly.
      - name: Sync existing migration history
        if: steps.secrets.outputs.ok == 'true'
        run: |
          psql "$DB_URL" <<'SQL'
            CREATE TABLE IF NOT EXISTS supabase_migrations.schema_migrations (
              version text NOT NULL PRIMARY KEY,
              statements text[],
              name text
            );
            INSERT INTO supabase_migrations.schema_migrations (version, name)
            VALUES
              ('001', '001_initial_schema'),
              ('002', '002_rls_policies'),
              ('003', '003_functions_triggers'),
              ('004', '004_fixes'),
              ('005', '005_display_clock'),
              ('006', '006_leaderboard_all_members'),
              ('007', '007_fix_prediction_resolution'),
              ('008', '008_last_week_points'),
              ('009', '009_streak_bonus_backfill'),
              ('010', '010_full_data_repair'),
              ('011', '011_reset_group_scores')
            ON CONFLICT (version) DO NOTHING;
          SQL
        env:
          DB_URL: postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co:5432/postgres

      # Push any new migration files (012, 013, ...) that aren't in history yet
      - name: Apply pending migrations
        if: steps.secrets.outputs.ok == 'true'
        run: |
          supabase db push \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
