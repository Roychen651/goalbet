name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend: TypeScript + Vite build ───────────────────────────────────────
  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Vite requires real env vars to build; supply stubs so the build doesn't
      # throw "Missing VITE_SUPABASE_URL" at import time.
      - name: Build (production)
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_BACKEND_URL: https://placeholder-backend.example.com
        run: npm run build

  # ─── Backend: TypeScript compilation ─────────────────────────────────────────
  backend:
    name: Backend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

  # ─── Database: Sync migration history ────────────────────────────────────────
  # Marks manually-applied migrations as "applied" in Supabase's tracking table.
  # No DB password needed — uses the Supabase Management API via CLI.
  # New migrations must be applied manually via the Supabase SQL Editor.
  # Required GitHub Secrets (both already added):
  #   SUPABASE_ACCESS_TOKEN  → supabase.com → Account → Access Tokens
  #   SUPABASE_PROJECT_REF   → supabase.com/dashboard/project/[THIS_PART]/...
  migrate:
    name: Database — deploy migrations
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets are configured
        id: secrets
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$REF" ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "✅ Supabase secrets found"
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "::notice::Supabase secrets not configured. Add SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF to GitHub Secrets."
          fi

      - name: Setup Supabase CLI
        if: steps.secrets.outputs.ok == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Mark all known migrations as applied (idempotent — safe to re-run).
      # New migrations are applied manually in Supabase SQL Editor.
      - name: Sync migration history
        if: steps.secrets.outputs.ok == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          REF="${{ secrets.SUPABASE_PROJECT_REF }}"
          for v in 001 002 003 004 005 006 007 008 009 010 011 012; do
            supabase migration repair --status applied "$v" --project-ref "$REF" || true
          done
          echo "✅ Migration history synced"
