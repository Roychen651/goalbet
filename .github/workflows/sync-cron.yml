name: Sync Cron

# Runs every 30 minutes regardless of whether the backend is awake.
# Permanently keeps matches, scores, and fixtures up-to-date even on free-tier hosts.
# No auth required — sync endpoints are public (they only fetch public ESPN data).
#
# Required GitHub Secret:
#   BACKEND_URL   — e.g. https://your-app.onrender.com

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes, 24/7
  workflow_dispatch:          # allow manual trigger from GitHub Actions UI

jobs:
  sync:
    name: Sync matches & scores
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check BACKEND_URL is configured
        id: secrets
        env:
          URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -n "$URL" ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "✅ BACKEND_URL is set"
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "::warning::BACKEND_URL not set — skipping sync. Add BACKEND_URL to GitHub Secrets."
          fi

      # 1. Wake the backend (free-tier hosts sleep after inactivity)
      - name: Wake backend
        if: steps.secrets.outputs.ok == 'true'
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          curl -s -o /dev/null -w "Health: HTTP %{http_code}\n" \
            --max-time 30 "$BACKEND_URL/api/health" || true

      # 2. Sync upcoming fixtures (keeps fixture list always 21 days ahead)
      - name: Sync match fixtures
        if: steps.secrets.outputs.ok == 'true'
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          STATUS=$(curl -s -o /tmp/matches_response.json -w "%{http_code}" \
            --max-time 60 \
            -X POST "$BACKEND_URL/api/sync/matches" \
            -H "Content-Type: application/json")
          echo "HTTP $STATUS"
          cat /tmp/matches_response.json
          if [ "$STATUS" != "200" ]; then
            echo "::error::Match sync returned HTTP $STATUS"
            exit 1
          fi

      # 3. Resolve scores for finished/live matches
      - name: Sync scores & resolve predictions
        if: steps.secrets.outputs.ok == 'true'
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          STATUS=$(curl -s -o /tmp/scores_response.json -w "%{http_code}" \
            --max-time 60 \
            -X POST "$BACKEND_URL/api/sync/scores" \
            -H "Content-Type: application/json")
          echo "HTTP $STATUS"
          cat /tmp/scores_response.json
          if [ "$STATUS" != "200" ]; then
            echo "::error::Score sync returned HTTP $STATUS"
            exit 1
          fi
