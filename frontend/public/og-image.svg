<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08100a"/>
      <stop offset="100%" style="stop-color:#060a07"/>
    </linearGradient>

    <!-- Green glow radial -->
    <radialGradient id="glowGreen" cx="30%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:rgba(0,255,135,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(0,255,135,0)"/>
    </radialGradient>

    <!-- Orange glow radial -->
    <radialGradient id="glowOrange" cx="80%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,107,53,0.14)"/>
      <stop offset="100%" style="stop-color:rgba(255,107,53,0)"/>
    </radialGradient>

    <!-- Card blur filter approximation -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#glowGreen)"/>
  <rect width="1200" height="630" fill="url(#glowOrange)"/>

  <!-- Subtle grid overlay -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- ── Left column: branding ── -->

  <!-- GOAL text -->
  <text
    x="96"
    y="290"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="148"
    font-weight="900"
    letter-spacing="8"
    fill="white"
  >GOAL</text>

  <!-- BET text with green glow -->
  <text
    x="96"
    y="420"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="148"
    font-weight="900"
    letter-spacing="8"
    fill="#00ff87"
    filter="url(#glow)"
  >BET</text>

  <!-- ⚽ emoji -->
  <text x="96" y="490" font-size="52">⚽</text>

  <!-- Tagline -->
  <text
    x="96"
    y="555"
    font-family="'Arial', sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="2"
    fill="rgba(255,255,255,0.45)"
  >Predict. Compete. Win.</text>

  <!-- ── Divider ── -->
  <rect x="680" y="80" width="1" height="470" fill="rgba(255,255,255,0.07)"/>

  <!-- ── Right column: feature pills ── -->

  <!-- Feature 1 -->
  <rect x="720" y="140" width="400" height="72" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="760" y="172" font-size="28">🏆</text>
  <text x="804" y="166" font-family="Arial" font-size="18" font-weight="600" fill="white">5-Tier Predictions</text>
  <text x="804" y="192" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.45)">Score, result, corners, BTTS &amp; more</text>

  <!-- Feature 2 -->
  <rect x="720" y="234" width="400" height="72" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="760" y="266" font-size="28">⚡</text>
  <text x="804" y="260" font-family="Arial" font-size="18" font-weight="600" fill="white">Real-Time Leaderboard</text>
  <text x="804" y="286" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.45)">Live scores, instant point updates</text>

  <!-- Feature 3 -->
  <rect x="720" y="328" width="400" height="72" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="760" y="360" font-size="28">👥</text>
  <text x="804" y="354" font-family="Arial" font-size="18" font-weight="600" fill="white">Private Friend Groups</text>
  <text x="804" y="380" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.45)">Invite code, compete with your crew</text>

  <!-- Feature 4 -->
  <rect x="720" y="422" width="400" height="72" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="760" y="454" font-size="28">🆓</text>
  <text x="804" y="448" font-family="Arial" font-size="18" font-weight="600" fill="white">100% Free</text>
  <text x="804" y="474" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.45)">Premier League, CL, La Liga &amp; more</text>

  <!-- Bottom green accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="rgba(0,255,135,0.15)"/>
  <rect x="0" y="618" width="1200" height="3" fill="#00ff87" opacity="0.6"/>
</svg>
