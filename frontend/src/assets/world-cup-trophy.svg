<!--
  FIFA World Cup Trophy — authentic Gazzaniga silhouette.
  Original path: "World Cup" by Clemzo (2010-06-11, Openclipart, CC0).
  https://openclipart.org/detail/65779/world-cup-by-clemzo

  Layers (bottom → top):
    1. Warm gold body gradient (fill-rule: nonzero) — solid silhouette
    2. Left-to-right highlight overlay — 3D depth and metallic shine
    3. Green malachite bands — clipped to silhouette, at the base plinth
    4. Thin dark outline stroke — defines the edge, hand-drawn feel
-->
