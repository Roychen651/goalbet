      <stop offset="0.15" stop-color="#FFE08A"/>
      <stop offset="0.35" stop-color="#FFC94A"/>
      <stop offset="0.58" stop-color="#E8A420"/>
      <stop offset="0.80" stop-color="#C57A0F"/>
      <stop offset="1"    stop-color="#8E5509"/>
    </linearGradient>

    <!-- Left-side specular highlight — makes it feel polished/cylindrical -->
    <linearGradient id="wc-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="0.28" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>

